<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GLOW — Your Makeup Profile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF6F1;
      --deep: #1A1108;
      --bronze: #C8894A;
      --blush: #E8C4A0;
      --muted: #7A6855;
      --card: #FFFFFF;
    }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--deep);
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--blush);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--bronze);
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: 4px;
    }

    .upload-section {
      max-width: 480px;
      margin: 48px auto 0;
      padding: 0 24px;
      text-align: center;
    }

    .upload-section h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .upload-section h1 em {
      font-style: italic;
      color: var(--bronze);
    }

    .upload-section p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .upload-box {
      border: 1.5px dashed var(--blush);
      border-radius: 16px;
      padding: 40px 24px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: white;
    }

    .upload-box:hover { border-color: var(--bronze); background: #FDF9F5; }

    .upload-box input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .upload-icon {
      width: 48px; height: 48px;
      background: var(--blush);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 20px;
    }

    .upload-box p { font-size: 13px; color: var(--muted); margin: 0; }
    .upload-box strong { font-size: 15px; color: var(--deep); display: block; margin-bottom: 4px; }

    .preview-img {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bronze);
      margin: 0 auto 12px;
      display: none;
    }

    .occasion-section {
      max-width: 480px;
      margin: 24px auto 0;
      padding: 0 24px;
    }

    .occasion-section label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .occasion-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .pill {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--blush);
      font-size: 13px;
      cursor: pointer;
      background: white;
      color: var(--deep);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .pill:hover, .pill.active {
      background: var(--bronze);
      border-color: var(--bronze);
      color: white;
    }

    .cta-btn {
      width: 100%;
      padding: 16px;
      background: var(--deep);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 48px;
    }

    .cta-btn:hover { background: var(--bronze); }
    .cta-btn:active { transform: scale(0.98); }
    .cta-btn:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }

    #results {
      display: none;
      max-width: 480px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding: 20px;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--blush);
    }

    .profile-header img {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bronze);
    }

    .profile-header-text h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
    }

    .profile-header-text p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .result-card {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--blush);
      padding: 20px;
      margin-bottom: 16px;
    }

    .result-card h3 {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bronze);
      margin-bottom: 12px;
    }

    .result-card .content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--deep);
      white-space: pre-wrap;
    }

    .loading {
      text-align: center;
      padding: 48px 24px;
      display: none;
    }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .dot {
      width: 10px; height: 10px;
      background: var(--bronze);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-12px); }
    }

    .loading p {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    .error-msg {
      background: #FFF0F0;
      border: 1px solid #F5C0C0;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #C0392B;
      margin-bottom: 16px;
      display: none;
      max-width: 480px;
      margin: 0 auto 16px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">GLOW</div>
    <div class="tagline">Makeup made for your face</div>
  </div>
</header>

<div class="upload-section" id="uploadSection">
  <h1>Your face.<br><em>Your look.</em></h1>
  <p>Upload a selfie and tell us the occasion. We'll build a makeup profile made specifically for you — not for someone else's face.</p>

  <div class="upload-box" id="uploadBox">
    <input type="file" id="fileInput" accept="image/*" />
    <img class="preview-img" id="previewImg" />
    <div class="upload-icon" id="uploadIcon">📸</div>
    <strong id="uploadLabel">Upload your selfie</strong>
    <p id="uploadSub">JPG or PNG · Good lighting helps</p>
  </div>
</div>

<div class="occasion-section">
  <label>What's the occasion?</label>
  <div class="occasion-pills">
    <button class="pill active" onclick="selectPill(this, 'Girl\'s night out')">Girl's night out</button>
    <button class="pill" onclick="selectPill(this, 'Everyday natural')">Everyday natural</button>
    <button class="pill" onclick="selectPill(this, 'Work / office')">Work / office</button>
    <button class="pill" onclick="selectPill(this, 'Date night')">Date night</button>
    <button class="pill" onclick="selectPill(this, 'Festival / event')">Festival / event</button>
    <button class="pill" onclick="selectPill(this, 'Brunch with friends')">Brunch</button>
  </div>
  <button class="cta-btn" id="analyseBtn" onclick="analyse()">Generate my makeup profile →</button>
</div>

<div class="loading" id="loading">
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <p>Analysing your features and building your profile…</p>
</div>

<div class="error-msg" id="errorMsg"></div>

<div id="results"></div>

<script>
  let selectedOccasion = "Girl's night out";
  let imageBase64 = null;

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataUrl = ev.target.result;
      imageBase64 = dataUrl.split(',')[1];

      const preview = document.getElementById('previewImg');
      preview.src = dataUrl;
      preview.style.display = 'block';
      document.getElementById('uploadIcon').style.display = 'none';
      document.getElementById('uploadLabel').textContent = 'Photo ready ✓';
      document.getElementById('uploadSub').textContent = file.name;
    };
    reader.readAsDataURL(file);
  });

  function selectPill(el, occasion) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedOccasion = occasion;
  }

  async function analyse() {
    if (!imageBase64) {
      showError("Please upload a selfie first.");
      return;
    }

    document.getElementById('uploadSection').style.display = 'none';
    document.querySelector('.occasion-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    try {
      const response = await fetch("/.netlify/functions/analyse", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64, occasion: selectedOccasion })
      });

      const data = await response.json();
      const clean = data.result.replace(/```json|```/g, "").trim();
      const profile = JSON.parse(clean);
      renderResults(profile);

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('uploadSection').style.display = 'block';
      document.querySelector('.occasion-section').style.display = 'block';
      showError("Something went wrong generating your profile. Please try again.");
      console.error(err);
    }
  }

  function renderResults(p) {
    document.getElementById('loading').style.display = 'none';

    const previewSrc = document.getElementById('previewImg').src;

    const productsHTML = p.products.map(prod => `
      <div style="padding: 10px 0; border-bottom: 1px solid #F5EDE4;">
        <div style="font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color: var(--muted); margin-bottom:3px;">${prod.category}</div>
        <div style="font-size:14px; font-weight:500; margin-bottom:2px;">${prod.name}</div>
        <div style="font-size:13px; color: var(--muted);">${prod.why}</div>
      </div>
    `).join('');

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = `
      <div class="profile-header">
        <img src="${previewSrc}" />
        <div class="profile-header-text">
          <h2>Your Makeup Profile</h2>
          <p>${selectedOccasion}</p>
        </div>
      </div>

      <div class="result-card">
        <h3>Your features</h3>
        <div class="content">${p.face_analysis}</div>
      </div>

      <div class="result-card">
        <h3>The vibe</h3>
        <div class="content">${p.occasion_vibe}</div>
      </div>

      <div class="result-card">
        <h3>Skin & base</h3>
        <div class="content">${p.skin}</div>
      </div>

      <div class="result-card">
        <h3>Eyes</h3>
        <div class="content">${p.eyes}</div>
      </div>

      <div class="result-card">
        <h3>Brows</h3>
        <div class="content">${p.brows}</div>
      </div>

      <div class="result-card">
        <h3>Cheeks</h3>
        <div class="content">${p.cheeks}</div>
      </div>

      <div class="result-card">
        <h3>Lips</h3>
        <div class="content">${p.lips}</div>
      </div>

      <div class="result-card">
        <h3>Recommended products</h3>
        ${productsHTML}
      </div>

      <div class="result-card" style="background: #FDF6EE; border-color: var(--bronze);">
        <h3>Pro tip</h3>
        <div class="content">${p.pro_tip}</div>
      </div>

      <button class="cta-btn" onclick="location.reload()" style="margin-top:8px;">Try a different look →</button>
    `;

    resultsEl.style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
